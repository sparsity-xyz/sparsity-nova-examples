version: v1
name: "btc-oracle"
target: "btc-oracle-enclave:latest"
sources:
  app: "btc-oracle:latest"
  capsule-runtime: "capsule-runtime-dev:latest"
  capsule-shell: "capsule-wrapper-base-dev:latest"
defaults:
  memory_mb: 2048
ingress:
  - listen_port: 8000
egress:
  allow:
    - "api.coingecko.com"
    - "sepolia.base.org"
api:
  listen_port: 18000
aux_api:
  listen_port: 18001
